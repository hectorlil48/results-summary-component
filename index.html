<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />

    <title>Frontend Mentor | Results summary component</title>
  </head>
  <body>
    <main>
      <div class="card">
        <div class="card__results">
          <h1>Your Result</h1>
          <div class="card__score">
            <span class="card__score-number">76</span>
            <span class="card__score-total">of 100</span>
          </div>
          <h2>Great</h2>
          <p>
            You scored higher than 65% of the people who have taken these tests.
          </p>
        </div>

        <div class="card__summary">
          <h3>Summary</h3>
          <ul>
            <li class="card__item card__item-reaction">
              <span class="card__item-label">
                <img src="assets/images/icon-reaction.svg" alt="" />
                Reaction</span
              >
              <span class="card__item-score"
                >80 <span class="card__item-total">/ 100</span></span
              >
            </li>
            <li class="card__item card__item-memory">
              <span class="card__item-label">
                <img src="assets/images/icon-memory.svg" alt="" />Memory</span
              >
              <span class="card__item-score"
                >92 <span class="card__item-total">/ 100</span></span
              >
            </li>
            <li class="card__item card__item-verbal">
              <span class="card__item-label">
                <img src="assets/images/icon-verbal.svg" alt="" />Verbal</span
              >
              <span class="card__item-score"
                >61 <span class="card__item-total">/ 100</span></span
              >
            </li>
            <li class="card__item card__item-visual">
              <span class="card__item-label">
                <img src="assets/images/icon-visual.svg" alt="" />Visual</span
              >
              <span class="card__item-score"
                >72 <span class="card__item-total">/ 100</span></span
              >
            </li>
          </ul>
          <button class="card__button">Continue</button>
        </div>
      </div>
    </main>

  </div> -->
  </body>
</html>
